<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訂單出貨查詢</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
  background: #f7f7f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 480px;
  margin: 0 auto;
}

h1 {
  font-size: 26px;
  margin-bottom: 8px;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

button:active {
  opacity: 0.8;
}

.card {
  margin-top: 20px;
  padding: 18px;
  background: white;
  border-radius: 14px;
  display: none;
}

.status {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

.status.green { color: #2e7d32; }
.status.blue { color: #1976d2; }
.status.orange { color: #ef6c00; }
.status.gray { color: #666; }

.label {
  color: #888;
  font-size: 14px;
}

.value {
  margin-bottom: 10px;
}

.error {
  color: #c62828;
}

.loading {
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<h1>訂單出貨查詢</h1>
<div class="subtitle">輸入訂單編號，查看最新出貨進度</div>

<input id="orderId" placeholder="例如 HL1001" />
<button onclick="search()">查詢</button>

<div id="card" class="card"></div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzMpnTLJb5w0W7EOlq8mBY10cqAr1cxV219RUOHVlilxXYWWQyI8gXhe7kbDjZ02rFvkw/exec';

function getStatusClass(status) {
  if (!status) return "gray";
  if (status.includes("已送達")) return "green";
  if (status.includes("配送")) return "blue";
  if (status.includes("出貨")) return "blue";
  if (status.includes("備貨")) return "orange";
  return "gray";
}

async function search() {
  const orderId = document.getElementById('orderId').value.trim();
  const card = document.getElementById('card');

  if (!orderId) {
    card.style.display = "block";
    card.innerHTML = `<div class="error">請輸入訂單編號</div>`;
    return;
  }

  card.style.display = "block";
  card.innerHTML = `<div class="loading">查詢中...</div>`;

  try {
    const res = await fetch(`${API_URL}?order_id=${orderId}`);
    const data = await res.json();

    if (!data.success) {
      card.innerHTML = `<div class="error">查無訂單，請確認編號</div>`;
      return;
    }

    const d = data.data;
    const statusClass = getStatusClass(d.shipping_status);

    card.innerHTML = `
      <div class="status ${statusClass}">
        ${d.shipping_status || "處理中"}
      </div>

      <div class="label">訂單編號</div>
      <div class="value">${d.order_id}</div>

      <div class="label">出貨日期</div>
      <div class="value">${d.shipping_date || "尚未出貨"}</div>
    `;

  } catch (e) {
    card.innerHTML = `<div class="error">系統暫時無法查詢</div>`;
  }
}
</script>

</body>
</html>
