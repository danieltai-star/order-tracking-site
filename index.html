<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訂單查詢系統</title>
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background-color: #FBFBFB;
      color: #1D1D1F;
      -webkit-font-smoothing: antialiased;
    }
    
    .loading-spinner {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-left-color: #fff;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center px-6 py-12 sm:py-24">

  <div class="w-full max-w-md">
    <!-- Header -->
    <header class="text-center mb-12">
      <h1 class="text-3xl font-semibold tracking-tight mb-2">訂單查詢</h1>
      <p class="text-gray-500 font-light">hó-lim Suí 訂單狀態追蹤</p>
    </header>

    <!-- Search Input -->
    <div class="relative mb-8">
      <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
        <i data-lucide="search" class="w-5 h-5"></i>
      </div>
      <input
        type="text"
        id="orderId"
        placeholder="請輸入贊助編號"
        class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-4 pl-12 focus:outline-none focus:ring-2 focus:ring-black/5 focus:border-gray-400 transition-all duration-300 shadow-sm placeholder:text-gray-300"
      />
      <button
        id="searchBtn"
        class="absolute right-2 top-1/2 -translate-y-1/2 bg-black text-white px-6 py-2.5 rounded-xl font-medium text-sm hover:bg-zinc-800 active:scale-95 transition-all disabled:opacity-50 flex items-center justify-center min-w-[80px]"
      >
        <span id="btnText">查詢</span>
        <div id="btnLoader" class="loading-spinner hidden"></div>
      </button>
    </div>

    <!-- Error Message -->
    <div id="errorBox" class="hidden fade-in flex items-center gap-3 p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-sm mb-6">
      <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
      <p id="errorMsg"></p>
    </div>

    <!-- Result Card -->
    <div id="resultCard" class="hidden fade-in bg-white border border-gray-100 rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] overflow-hidden">
      <div class="flex justify-between items-start mb-8">
        <div>
          <p class="text-xs uppercase tracking-widest text-gray-400 font-semibold mb-1 font-[Arial]">Order ID</p>
          <h2 id="resOrderId" class="text-[16px] leading-[23px] font-medium"></h2>
        </div>
      </div>

      <div class="space-y-6">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400">
            <i data-lucide="package" class="w-5 h-5"></i>
          </div>
          <div class="flex-1">
            <p class="text-xs text-gray-400 font-medium uppercase tracking-wider h-4 border-[#444444] m-0 p-0">預估出貨時程</p>
            <p id="resDate" class="text-gray-700 font-medium"></p>
          </div>
        </div>
        
        <div class="pt-4 border-t border-gray-50">
          <p class="text-[13px] text-[#6c6c6c]">將於出貨前 5 天內提供實際出貨日期，並持續更新於查詢系統中。</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 引入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // 初始化圖示
    lucide.createIcons();

    const API_URL = 'https://script.google.com/macros/s/AKfycbzMpnTLJb5w0W7EOlq8mBY10cqAr1cxV219RUOHVlilxXYWWQyI8gXhe7kbDjZ02rFvkw/exec';

    const orderInput = document.getElementById('orderId');
    const searchBtn = document.getElementById('searchBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const errorBox = document.getElementById('errorBox');
    const errorMsg = document.getElementById('errorMsg');
    const resultCard = document.getElementById('resultCard');

    const resOrderId = document.getElementById('resOrderId');
    const resDate = document.getElementById('resDate');

    async function searchOrder() {
      const orderId = orderInput.value.trim();

      if (!orderId) {
        showError('請輸入贊助編號');
        return;
      }

      // Reset UI
      setLoading(true);
      errorBox.classList.add('hidden');
      resultCard.classList.add('hidden');

      try {
        const response = await fetch(`${API_URL}?order_id=${encodeURIComponent(orderId)}`);
        const data = await response.json();

        if (data.success) {
          displayResult(data.data);
        } else {
          showError(data.message || '找不到該訂單，請確認編號是否正確');
        }
      } catch (error) {
        showError('系統連線異常，請稍後再試');
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading) {
      searchBtn.disabled = isLoading;
      if (isLoading) {
        btnText.classList.add('hidden');
        btnLoader.classList.remove('hidden');
      } else {
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function displayResult(data) {
      resOrderId.textContent = data.order_id;
      resDate.textContent = data.shipping_date || '處理中';
      
      resultCard.classList.remove('hidden');
      lucide.createIcons(); // 重新渲染新插入的圖示
    }

    searchBtn.addEventListener('click', searchOrder);
    orderInput.addEventListener('keydown', (e) => e.key === 'Enter' && searchOrder());
  </script>
</body>
</html>
