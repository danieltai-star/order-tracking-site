<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訂單查詢</title>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
      margin-top: 10px;
    }

    button {
      cursor: pointer;
    }

    .result {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: none;
      white-space: pre-line;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <h1>訂單出貨查詢</h1>
  <p>請輸入您的訂單編號</p>

  <input type="text" id="orderId" placeholder="例如 HL1001" />
  <button id="searchBtn">查詢</button>

  <div id="result" class="result"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzMpnTLJb5w0W7EOlq8mBY10cqAr1cxV219RUOHVlilxXYWWQyI8gXhe7kbDjZ02rFvkw/exec';

    const orderInput = document.getElementById('orderId');
    const searchBtn = document.getElementById('searchBtn');
    const resultBox = document.getElementById('result');

    async function searchOrder() {
      const orderId = orderInput.value.trim();

      if (!orderId) {
        resultBox.style.display = 'block';
        resultBox.className = 'result error';
        resultBox.textContent = '請先輸入訂單編號';
        return;
      }

      resultBox.style.display = 'block';
      resultBox.className = 'result';
      resultBox.textContent = '查詢中...';

      try {
        const response = await fetch(`${API_URL}?order_id=${encodeURIComponent(orderId)}`);
        const data = await response.json();

        if (data.success) {
          resultBox.className = 'result';
          resultBox.textContent =
`訂單編號：${data.data.order_id}
出貨狀態ABC：${data.data.shipping_status || '—'}
出貨日期：${data.data.shipping_date || '—'}`;
        } else {
          resultBox.className = 'result error';
          resultBox.textContent = data.message || '查詢失敗';
        }
      } catch (error) {
        resultBox.className = 'result error';
        resultBox.textContent = '系統暫時無法查詢，請稍後再試';
      }
    }

    searchBtn.addEventListener('click', searchOrder);

    orderInput.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        searchOrder();
      }
    });
  </script>
</body>
</html>
